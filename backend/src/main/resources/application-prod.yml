# ╔══════════════════════════════════════════════════════════════╗
# ║              生产环境配置（所有敏感值通过环境变量注入）       ║
# ╚══════════════════════════════════════════════════════════════╝
# ⚠️ 本文件中 ${} 占位符的值均来自 docker-compose.prod.yml 中 backend 容器的 environment: 块
# 部署时需设置以下环境变量，不在文件中硬编码任何密钥/密码：
#   DB_URL, DB_USERNAME, DB_PASSWORD
#   REDIS_HOST, REDIS_PORT（默认 6379）, REDIS_PASSWORD
#   CORS_ALLOWED_ORIGINS
#   MINIO_ENDPOINT, MINIO_ACCESS_KEY, MINIO_SECRET_KEY, MINIO_BUCKET

spring:
  # ── 数据源：连接串、用户、密码全部来自环境变量 ──
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    # ── Redis：主机、端口、密码来自环境变量 ──
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379} # :在这里是默认值分隔符，:6379 是默认值，环境变量未设置时使用
      password: ${REDIS_PASSWORD} # 与 redis 容器 --requirepass 一致，无密码则连接被拒
  # ── Session 存 Redis（与开发环境一致，保证行为统一） ──
  session:
    store-type: redis

# ── 自定义业务配置 ──
app:
  # CORS 跨域：生产环境下配置实际的域名，多个域名用逗号分隔
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  # MinIO 对象存储：生产环境凭证来自环境变量
  storage:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET}

# ── 生产安全强化：Session Cookie 仅 HTTPS 传输 ──
# 生产必须走 HTTPS，secure=true 后 Cookie 只在加密连接中发送，防明文监听窃取
# （开发环境走 HTTP，不设此项，默认 false）。CSRF Cookie 的 secure 由 SecurityConfig 读取同一属性同步开启
server:
  # 反向代理（Nginx）在前面终止 HTTPS 后以内网 HTTP 转发给 Spring，
  # framework 让 Spring 信任 X-Forwarded-* 头，从而正确识别 https 协议与真实客户端 IP
  # （利好：日志记真实 IP、生成的绝对 URL 用 https；当前 Cookie secure 已硬编码，故非强依赖）
  # 可选值：none（默认，忽略转发头）/ native（交容器 Tomcat 解析）/ framework（交 Spring 过滤器解析，容器无关、可移植）
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true

# ── 生产环境关闭 Swagger / OpenAPI 文档，避免对外暴露接口结构 ──
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ── 日志级别：生产默认 info，避免 debug 日志洗刷与性能开销 ──
logging:
  level:
    root: info
    com.pixspace.backend: info
